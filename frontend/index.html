<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>InvestApp - Головна</title>
    <style>
        :root{
            --bg1: #f6fbff;
            --bg2: #f3fff9;
            --card: #ffffff;
            --accent: #6ee7b7;
            --accent-2: #93c5fd;
            --shadow: 0 6px 18px rgba(16,24,40,0.08);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--accent-2), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-top: 40px;
            max-width: 800px;
        }
        .card {
            background: var(--card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            text-decoration: none;
            color: #0f172a;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(16,24,40,0.15);
        }
        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .card-desc {
            color: #6b7280;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 InvestApp</h1>
        <p style="font-size: 1.2rem; color: #6b7280;">Виберіть інструмент для роботи</p>
        <div class="cards">
            <a href="stock.html" class="card">
                <div class="icon">📈</div>
                <div class="card-title">Графік Акцій</div>
                <div class="card-desc">Аналіз та візуалізація фондового ринку</div>
            </a>
            <a href="investment.html" class="card">
                <div class="icon">💹</div>
                <div class="card-title">Інвестиційний Калькулятор</div>
                <div class="card-desc">Прогноз інвестицій з урахуванням податків та інфляції</div>
            </a>
        </div>
    </div>
</body>
</html>
