server {
    listen 80;
    server_name investapp.pp.ua www.investapp.pp.ua;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name investapp.pp.ua www.investapp.pp.ua;

    ssl_certificate /etc/letsencrypt/live/investapp.pp.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/investapp.pp.ua/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = / {
        try_files /index.html =404;
    }

    location = /stock {
        try_files /stock.html =404;
    }

    location = /investment {
        try_files /investment.html =404;
    }

    location = /item {
        try_files /items.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}